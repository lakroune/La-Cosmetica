version: '3.8'
services:

  # Application service (Laravel)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cosmetica-app
    restart: unless-stopped  # Restart automatically unless manually stopped
    volumes:
      - ./:/var/www   # Mount the project directory into the container
    networks:
      - cosmetica-network

  # Database service (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: cosmetica-db
    restart: unless-stopped
    ports:
      - "5432:5432"  # Map host port 5432 to container port 5432
    environment:
      POSTGRES_DB: la_cosmetica
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD} # Will take value from .env file
    networks:
      - cosmetica-network

  # Web server service (Nginx)
  nginx:
    image: nginx:alpine
    container_name: cosmetica-nginx
    restart: unless-stopped
    ports:
      - "8000:80"  # Map host port 8000 to container port 80
    volumes:
      - ./:/var/www                 # Project folder
      - ./docker-compose/nginx:/etc/nginx/conf.d/  # Nginx configuration
    networks:
      - cosmetica-network

networks:
  cosmetica-network:
    driver: bridge  # Internal Docker network